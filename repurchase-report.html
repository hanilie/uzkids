<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UZ · Repurchase Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: "Noto Sans KR", -apple-system, sans-serif; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #F7F2EA; z-index: 9999; transition: opacity 0.3s;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  #loading .text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; color: #C97F5C; font-size: 22px; letter-spacing: 0.05em;
  }
</style>

<!-- React + Recharts + Babel via CDN (no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="loading"><div class="text">UZ Report loading…</div></div>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, ResponsiveContainer, Cell, LabelList } = Recharts;

const palette = {
  cream: '#F7F2EA',
  paper: '#FBF8F2',
  ink: '#2A2520',
  mute: '#7A6F5F',
  line: '#E5DDD0',
  accent: '#C97F5C',
  accent2: '#8FA68A',
  accent3: '#D4B896',
  warm: '#E8B89A',
  red: '#B85C4F',
};

const repurchaseByProduct = [
  { name: 'Easy Move Pants', n: 115, r: 14, rate: 12.2, vsBase: 2.1 },
  { name: 'Soft Curl Tee', n: 104, r: 11, rate: 10.6, vsBase: 0.5 },
  { name: 'Daily Stripe Tee', n: 46, r: 4, rate: 8.7, vsBase: -1.4 },
  { name: 'Easy Cardigan Set', n: 44, r: 3, rate: 6.8, vsBase: -3.3 },
  { name: 'Soft Puff Bloomer', n: 42, r: 3, rate: 7.1, vsBase: -3.0 },
  { name: 'Easy Play Overall', n: 19, r: 1, rate: 5.3, vsBase: -4.8 },
  { name: 'Soft Blouse', n: 17, r: 0, rate: 0.0, vsBase: -10.1 },
  { name: 'Eyelet Bodysuit', n: 12, r: 0, rate: 0.0, vsBase: -10.1 },
  { name: 'Classic Bodysuit', n: 10, r: 0, rate: 0.0, vsBase: -10.1 },
];

const intervalDist = [
  { label: '1일 이내', n: 2 },
  { label: '2-3일', n: 4 },
  { label: '4-7일', n: 6 },
  { label: '8-30일', n: 5 },
  { label: '31-60일', n: 3 },
  { label: '61일 이상', n: 2 },
];

const aov = [
  { label: '단발 고객\n첫 세션', value: 74834, n: 195, color: palette.mute },
  { label: '재구매 고객\n첫 세션', value: 67266, n: 22, color: palette.accent2 },
  { label: '재구매 고객\n재구매 세션', value: 44892, n: 24, color: palette.accent },
];

const flows = [
  { from: 'Easy Move Pants', to: 'Soft Curl Tee', n: 9, base: 14, pct: 64 },
  { from: 'Soft Curl Tee', to: 'Soft Curl Tee', n: 7, base: 11, pct: 64 },
  { from: 'Soft Curl Tee', to: 'Easy Move Pants', n: 6, base: 11, pct: 55 },
  { from: 'Easy Move Pants', to: 'Easy Move Pants', n: 5, base: 14, pct: 36 },
  { from: 'Soft Curl Tee', to: 'Daily Stripe Tee', n: 3, base: 11, pct: 27 },
  { from: 'Easy Move Pants', to: 'Daily Stripe Tee', n: 3, base: 14, pct: 21 },
];

const KPICard = ({ label, value, sub, accent }) => (
  <div style={{
    background: palette.paper,
    border: `1px solid ${palette.line}`,
    padding: '20px 22px',
    borderRadius: 4,
    position: 'relative',
  }}>
    <div style={{
      fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase',
      color: palette.mute, marginBottom: 10, fontWeight: 500,
    }}>{label}</div>
    <div style={{
      fontSize: 32, fontWeight: 300, color: palette.ink,
      fontFamily: 'Cormorant Garamond, Georgia, serif', letterSpacing: '-0.02em',
      lineHeight: 1, marginBottom: 6,
    }}>{value}</div>
    {sub && (
      <div style={{ fontSize: 11.5, color: palette.mute, lineHeight: 1.5 }}>{sub}</div>
    )}
    {accent && (
      <div style={{
        position: 'absolute', top: 0, left: 0, width: 24, height: 2,
        background: accent,
      }}/>
    )}
  </div>
);

const SectionTitle = ({ num, kr, en }) => (
  <div style={{ marginBottom: 18, display: 'flex', alignItems: 'baseline', gap: 14, flexWrap: 'wrap' }}>
    <span style={{
      fontFamily: 'Cormorant Garamond, Georgia, serif',
      fontSize: 14, color: palette.accent, fontStyle: 'italic',
      fontWeight: 500,
    }}>0{num}</span>
    <span style={{
      fontSize: 17, color: palette.ink, fontWeight: 600, letterSpacing: '-0.01em',
    }}>{kr}</span>
    <span style={{
      fontSize: 11, color: palette.mute, letterSpacing: '0.08em',
      textTransform: 'uppercase', fontStyle: 'italic',
      fontFamily: 'Cormorant Garamond, Georgia, serif',
    }}>{en}</span>
    <div style={{ flex: 1, height: 1, background: palette.line, marginLeft: 6, minWidth: 20 }}/>
  </div>
);

const Dashboard = () => {
  const [hoveredFlow, setHoveredFlow] = useState(null);

  return (
    <div style={{
      minHeight: '100vh',
      background: `
        radial-gradient(ellipse at top left, #FAF5EC 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, #F2EBDD 0%, transparent 60%),
        ${palette.cream}
      `,
      padding: '40px 32px',
      fontFamily: '"Noto Sans KR", -apple-system, sans-serif',
      color: palette.ink,
    }}>
      <div style={{
        maxWidth: 1180, margin: '0 auto',
        background: palette.paper,
        border: `1px solid ${palette.line}`,
        padding: '44px 48px 40px',
        boxShadow: '0 1px 0 rgba(0,0,0,0.02), 0 30px 60px -30px rgba(60,40,20,0.12)',
      }}>

        {/* HEADER */}
        <div style={{ marginBottom: 36, paddingBottom: 24, borderBottom: `1px solid ${palette.line}` }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 32, flexWrap: 'wrap' }}>
            <div>
              <div style={{
                fontSize: 11, letterSpacing: '0.18em', color: palette.accent,
                textTransform: 'uppercase', marginBottom: 12, fontWeight: 600,
              }}>UZ · Repurchase Report</div>
              <h1 style={{
                margin: 0, fontSize: 38, lineHeight: 1.1,
                fontFamily: 'Cormorant Garamond, Georgia, serif',
                fontWeight: 400, letterSpacing: '-0.02em', color: palette.ink,
              }}>
                재구매 데이터로 본<br/>
                <span style={{ fontStyle: 'italic', color: palette.accent }}>UZ의 진짜 강점</span>
              </h1>
            </div>
            <div style={{ textAlign: 'right', minWidth: 200 }}>
              <div style={{ fontSize: 11, color: palette.mute, letterSpacing: '0.1em', marginBottom: 6 }}>
                ANALYSIS PERIOD
              </div>
              <div style={{ fontSize: 14, color: palette.ink, fontWeight: 500, marginBottom: 14 }}>
                2026.02.05 — 04.27
              </div>
              <div style={{ fontSize: 11, color: palette.mute, lineHeight: 1.6 }}>
                자사몰 카페24 / 품목 단위 분석<br/>
                24시간 세션 기준
              </div>
            </div>
          </div>
        </div>

        {/* KPI ROW */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 12, marginBottom: 36,
        }}>
          <KPICard
            label="전체 고객"
            value="217명"
            sub="260개 주문 · 563개 품목"
            accent={palette.mute}
          />
          <KPICard
            label="재구매 고객"
            value="22명"
            sub="24시간 세션 기준"
            accent={palette.accent2}
          />
          <KPICard
            label="재구매율"
            value="10.1%"
            sub="주문번호 기준 15.7%"
            accent={palette.accent}
          />
          <KPICard
            label="재구매 중앙값"
            value="6일"
            sub="평균 20.3일 · 절반이 1주 내"
            accent={palette.warm}
          />
        </div>

        {/* SECTION 01 */}
        <div style={{ marginBottom: 36 }}>
          <SectionTitle num="1" kr="재구매는 생각보다 빠르게 일어난다" en="Timing"/>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 28 }}>
            <div>
              <div style={{ fontSize: 12.5, color: palette.mute, lineHeight: 1.7, marginBottom: 16 }}>
                재구매 22명 중 <strong style={{ color: palette.ink }}>12명(55%)이 1주일 이내</strong>에 재구매했습니다.
                특히 <strong style={{ color: palette.accent }}>2-3일 이내가 6명</strong>으로,
                배송이 도착하기도 전에 다시 주문한 케이스. 이건 "옷이 좋아서 또"가 아니라
                "사이트를 다시 둘러보다 추가 구매"한 패턴입니다.
              </div>
              <div style={{
                background: 'rgba(201,127,92,0.06)',
                border: `1px solid rgba(201,127,92,0.2)`,
                padding: '14px 16px', borderRadius: 4,
              }}>
                <div style={{
                  fontSize: 10.5, letterSpacing: '0.1em', color: palette.accent,
                  textTransform: 'uppercase', fontWeight: 600, marginBottom: 6,
                }}>SO WHAT</div>
                <div style={{ fontSize: 12.5, color: palette.ink, lineHeight: 1.6 }}>
                  재구매 트리거를 "배송 후 2-3일"로 잡으면 늦습니다.
                  <strong> 주문 완료 페이지 · 결제 메일에서 페어 상품 추천</strong>이 더 빠르고 효과적.
                </div>
              </div>
            </div>
            <div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={intervalDist} margin={{ top: 20, right: 10, bottom: 5, left: 0 }}>
                  <XAxis
                    dataKey="label"
                    axisLine={{ stroke: palette.line }}
                    tickLine={false}
                    tick={{ fontSize: 10.5, fill: palette.mute }}
                  />
                  <YAxis hide/>
                  <Bar dataKey="n" radius={[2, 2, 0, 0]}>
                    {intervalDist.map((d, i) => (
                      <Cell key={i} fill={i < 3 ? palette.accent : palette.accent3}/>
                    ))}
                    <LabelList
                      dataKey="n"
                      position="top"
                      style={{ fill: palette.ink, fontSize: 11, fontWeight: 600 }}
                    />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
              <div style={{
                fontSize: 10.5, color: palette.mute, textAlign: 'center', marginTop: 4,
              }}>
                재구매 간격 분포 (N=22, 명 단위)
              </div>
            </div>
          </div>
        </div>

        {/* SECTION 02 */}
        <div style={{ marginBottom: 36 }}>
          <SectionTitle num="2" kr="Easy Move Pants ↔ Soft Curl Tee, 서로를 끌어주는 코어 듀오" en="Core Duo"/>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: 28 }}>
            <div>
              <div style={{ fontSize: 12.5, color: palette.mute, lineHeight: 1.7, marginBottom: 14 }}>
                두 상품은 <strong style={{ color: palette.ink }}>서로를 끌어주는 양방향 페어</strong>입니다.
                어느 쪽으로 들어와도 다른 쪽이 따라옵니다.
                특히 Easy Move Pants 첫 구매자의 64%가 재구매 시 Soft Curl Tee를 추가로 사요.
              </div>

              {flows.map((f, i) => (
                <div
                  key={i}
                  onMouseEnter={() => setHoveredFlow(i)}
                  onMouseLeave={() => setHoveredFlow(null)}
                  style={{
                    display: 'grid', gridTemplateColumns: '1fr auto 1fr auto',
                    alignItems: 'center', gap: 12, padding: '10px 12px',
                    borderBottom: i < flows.length - 1 ? `1px solid ${palette.line}` : 'none',
                    background: hoveredFlow === i ? 'rgba(201,127,92,0.05)' : 'transparent',
                    transition: 'background 0.2s', cursor: 'default',
                  }}
                >
                  <div style={{ fontSize: 11.5, color: palette.ink, fontWeight: 500 }}>{f.from}</div>
                  <div style={{
                    fontSize: 14, color: i < 3 ? palette.accent : palette.mute,
                    fontFamily: 'Cormorant Garamond, Georgia, serif',
                  }}>→</div>
                  <div style={{ fontSize: 11.5, color: palette.ink, fontWeight: 500 }}>{f.to}</div>
                  <div style={{
                    fontSize: 13, fontWeight: 600,
                    color: i < 3 ? palette.accent : palette.mute,
                    fontFamily: 'Cormorant Garamond, Georgia, serif',
                    minWidth: 70, textAlign: 'right',
                  }}>
                    {f.pct}%
                    <span style={{
                      fontSize: 10, color: palette.mute, marginLeft: 4, fontWeight: 400,
                    }}>({f.n}/{f.base})</span>
                  </div>
                </div>
              ))}
            </div>

            <div>
              <div style={{
                background: 'linear-gradient(135deg, #FBF8F2 0%, #F5EFE0 100%)',
                border: `1px solid ${palette.line}`, borderRadius: 4,
                padding: '24px 20px', height: '100%',
                display: 'flex', flexDirection: 'column', justifyContent: 'center',
              }}>
                <div style={{
                  fontSize: 10.5, letterSpacing: '0.12em', color: palette.mute,
                  textTransform: 'uppercase', textAlign: 'center', marginBottom: 18,
                }}>BIDIRECTIONAL FLOW</div>

                <div style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-around',
                  gap: 12, marginBottom: 24,
                }}>
                  <div style={{
                    flex: 1, textAlign: 'center', padding: '18px 12px',
                    background: 'rgba(201,127,92,0.1)',
                    border: `1.5px solid ${palette.accent}`, borderRadius: 4,
                  }}>
                    <div style={{
                      fontSize: 11, color: palette.mute, marginBottom: 4,
                    }}>매출/수량 1위</div>
                    <div style={{
                      fontSize: 14, fontWeight: 600, color: palette.ink, lineHeight: 1.3,
                    }}>Easy Move<br/>Pants</div>
                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                    <div style={{
                      fontSize: 18, color: palette.accent,
                      fontFamily: 'Cormorant Garamond, Georgia, serif',
                    }}>⇄</div>
                  </div>

                  <div style={{
                    flex: 1, textAlign: 'center', padding: '18px 12px',
                    background: 'rgba(143,166,138,0.1)',
                    border: `1.5px solid ${palette.accent2}`, borderRadius: 4,
                  }}>
                    <div style={{
                      fontSize: 11, color: palette.mute, marginBottom: 4,
                    }}>만능 픽업 상품</div>
                    <div style={{
                      fontSize: 14, fontWeight: 600, color: palette.ink, lineHeight: 1.3,
                    }}>Soft Curl<br/>Tee</div>
                  </div>
                </div>

                <div style={{
                  display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, fontSize: 11.5,
                }}>
                  <div style={{
                    background: palette.paper, padding: '10px 12px', borderRadius: 3,
                    borderLeft: `2px solid ${palette.accent}`,
                  }}>
                    <span style={{ color: palette.accent, fontWeight: 600 }}>64%</span>
                    <span style={{ color: palette.mute }}> 가 Pants → Tee</span>
                  </div>
                  <div style={{
                    background: palette.paper, padding: '10px 12px', borderRadius: 3,
                    borderLeft: `2px solid ${palette.accent2}`,
                  }}>
                    <span style={{ color: palette.accent2, fontWeight: 600 }}>55%</span>
                    <span style={{ color: palette.mute }}> 가 Tee → Pants</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* SECTION 03 */}
        <div style={{ marginBottom: 36 }}>
          <SectionTitle num="3" kr="진입 상품 vs 끝물 상품" en="Acquisition Power"/>

          <div style={{ fontSize: 12.5, color: palette.mute, lineHeight: 1.7, marginBottom: 16 }}>
            첫 구매에 어떤 상품이 있던 고객이 다시 돌아오는가? 평균 재구매율 10.1%를 기준선으로,
            <strong style={{ color: palette.ink }}> Easy Move Pants와 Soft Curl Tee만이 평균 이상</strong>입니다.
            영아용 바디슈트와 Soft Blouse는 재구매 0%로 명확한 약세 신호.
          </div>

          <ResponsiveContainer width="100%" height={280}>
            <BarChart
              data={repurchaseByProduct}
              layout="vertical"
              margin={{ top: 5, right: 60, bottom: 20, left: 130 }}
            >
              <XAxis type="number" domain={[0, 14]} hide/>
              <YAxis
                dataKey="name" type="category"
                axisLine={{ stroke: palette.line }} tickLine={false}
                tick={{ fontSize: 11, fill: palette.ink }}
                width={130}
              />
              <Bar dataKey="rate" radius={[0, 2, 2, 0]} barSize={16}>
                {repurchaseByProduct.map((d, i) => (
                  <Cell key={i} fill={
                    d.rate >= 10.1 ? palette.accent2
                    : d.rate >= 5 ? palette.accent3
                    : palette.line
                  }/>
                ))}
                <LabelList
                  dataKey="rate"
                  position="right"
                  formatter={(v) => `${v.toFixed(1)}%`}
                  style={{ fill: palette.ink, fontSize: 11, fontWeight: 500 }}
                />
              </Bar>
            </BarChart>
          </ResponsiveContainer>

          <div style={{
            display: 'flex', gap: 18, marginTop: 4, fontSize: 10.5, color: palette.mute,
            justifyContent: 'center', flexWrap: 'wrap',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 12, height: 8, background: palette.accent2, display: 'inline-block' }}/>
              평균 이상
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 12, height: 8, background: palette.accent3, display: 'inline-block' }}/>
              평균 이하
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 12, height: 8, background: palette.line, display: 'inline-block' }}/>
              0%
            </div>
            <div style={{ color: palette.accent }}>※ 기준선 10.1%</div>
          </div>
        </div>

        {/* SECTION 04 */}
        <div style={{ marginBottom: 36 }}>
          <SectionTitle num="4" kr="객단가는 재구매를 예측하지 않는다" en="AOV Pattern"/>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 28, alignItems: 'center' }}>
            <div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                {aov.map((a, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                    <div style={{
                      minWidth: 100, fontSize: 11, color: palette.mute, lineHeight: 1.4,
                      whiteSpace: 'pre-line', textAlign: 'right',
                    }}>{a.label}</div>
                    <div style={{ flex: 1, position: 'relative', height: 30 }}>
                      <div style={{
                        position: 'absolute', left: 0, top: 0, bottom: 0,
                        width: `${(a.value / 80000) * 100}%`,
                        background: a.color, borderRadius: 2,
                        display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
                        paddingRight: 10, transition: 'width 1s ease-out',
                      }}>
                        <span style={{
                          color: '#fff', fontSize: 11, fontWeight: 600,
                          fontFamily: 'Cormorant Garamond, Georgia, serif',
                        }}>
                          {a.value.toLocaleString()}원
                        </span>
                      </div>
                    </div>
                    <div style={{
                      minWidth: 36, fontSize: 10, color: palette.mute, fontStyle: 'italic',
                    }}>N={a.n}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{
              background: 'rgba(143,166,138,0.07)',
              border: `1px solid rgba(143,166,138,0.25)`,
              padding: '18px 20px', borderRadius: 4,
            }}>
              <div style={{
                fontSize: 10.5, letterSpacing: '0.1em', color: palette.accent2,
                textTransform: 'uppercase', fontWeight: 600, marginBottom: 8,
              }}>핵심 발견</div>
              <div style={{ fontSize: 12.5, color: palette.ink, lineHeight: 1.65 }}>
                재구매 고객의 첫 세션이 단발 고객보다 <strong>덜 씁니다</strong>.
                "큰 장보기 한 번"으로 끝내는 단발 고객 vs "가볍게 시작해 또 오는" 재구매 고객.
                <br/><br/>
                <span style={{ color: palette.mute }}>
